server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:voting_system}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:voting_user}
    password: ${DB_PASSWORD:voting_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:c2VjdXJlLXZvdGluZy1zeXN0ZW0tc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmc=}
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000}

logging:
  level:
    com.votingsystem: INFO
    org.springframework.security: WARN
